<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>AI Talk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b1120;
  --bg2: #111827;
  --surface: #161e2e;
  --surface2: #1c2640;
  --border: #243049;
  --text: #e8eaf0;
  --text2: #8b95b0;
  --text3: #5a6580;
  --accent: #4f46e5;
  --accent2: #6366f1;
  --accent-dim: rgba(79,70,229,.12);
  --gold: #d4a853;
  --gold2: #e8c36e;
  --green: #059669;
  --red: #dc2626;
  --font: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --topbar-h: 42px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100svh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Login */
.login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: radial-gradient(ellipse at 50% 0%, rgba(79,70,229,.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(212,168,83,.06) 0%, transparent 50%);
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px 40px;
  width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.login-box h1 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 6px;
  text-align: center;
}
.login-box .sub {
  color: var(--text2);
  font-size: 13px;
  text-align: center;
  margin-bottom: 32px;
}
/* Menu Page */
.menu-page { display: none; height: 100vh; align-items: center; justify-content: center; }
.menu-page.active { display: flex; }
.menu-inner { text-align: center; max-width: 600px; padding: 40px; }
.menu-inner h1 { font-size: 28px; margin-bottom: 8px; }
.menu-inner .sub { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
.menu-cards { display: flex; gap: 20px; }
.menu-card {
  flex: 1; padding: 32px 24px;
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); cursor: pointer;
  transition: all .25s; text-align: center;
}
.menu-card:hover { border-color: var(--accent2); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(79,70,229,.15); }
.menu-card .icon { font-size: 40px; margin-bottom: 16px; }
.menu-card h3 { font-size: 18px; margin-bottom: 8px; }
.menu-card p { font-size: 13px; color: var(--text2); line-height: 1.5; }

/* Chat Layout */
.chat-page { display: none; height: 100vh; flex-direction: column; }
.chat-page.active { display: flex; }

/* Topbar */
.topbar {
  display: flex;
  align-items: center;
  padding: 4px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
  min-height: var(--topbar-h);
}
.clear-btn {
  padding: 2px 8px;
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  font-size: 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  flex-shrink: 0;
  line-height: 18px;
}
.clear-btn:hover { background: var(--red); color: #fff; }
.back-btn {
  padding: 2px 6px; background: transparent; border: none;
  color: var(--text2); font-size: 16px; cursor: pointer; border-radius: 4px;
  transition: all .2s; white-space: nowrap; line-height: 1;
}
.back-btn:hover { background: var(--surface2); color: var(--text); }
.topbar .sop-steps {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
}
.step-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600;
  background: var(--bg2);
  color: var(--text3);
  border: 1px solid var(--border);
  transition: all .3s;
}
.step-dot.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(79,70,229,.3);
}
.step-dot.done {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}
.step-line {
  width: 12px; height: 1px;
  background: var(--border);
}
.step-line.done { background: var(--green); }

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  -webkit-overflow-scrolling: touch;
}

.msg { display: flex; gap: 12px; max-width: 75%; animation: fadeIn .3s ease; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  flex-shrink: 0;
}
.msg-avatar.ai { background: var(--accent); color: #fff; }
.msg-avatar.user { background: var(--gold); color: #0b1120; }

.msg-bubble {
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.7;
  font-size: 14px;
  word-break: break-word;
  position: relative;
}
.msg.ai .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border-bottom-right-radius: 4px;
}

/* Markdown */
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3, .msg-bubble h4 { margin: 12px 0 6px; font-weight: 600; color: var(--gold2); }
.msg-bubble h1 { font-size: 18px; }
.msg-bubble h2 { font-size: 16px; }
.msg-bubble h3 { font-size: 15px; }
.msg-bubble h4 { font-size: 14px; }
.msg-bubble p { margin: 6px 0; }
.msg-bubble ul, .msg-bubble ol { margin: 6px 0; padding-left: 20px; }
.msg-bubble li { margin: 3px 0; }
.msg-bubble strong { color: var(--gold2); }
.msg.user .msg-bubble strong { color: #fff; }
.msg-bubble code {
  background: rgba(255,255,255,.08);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
}
.msg-bubble pre {
  background: var(--bg2);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  overflow-x: auto;
  margin: 8px 0;
  border: 1px solid var(--border);
}
.msg-bubble pre code { background: none; padding: 0; }
.msg-bubble blockquote {
  border-left: 3px solid var(--gold);
  padding: 6px 12px;
  margin: 8px 0;
  color: var(--text2);
  background: var(--accent-dim);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.msg-bubble hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 12px 0;
}
.msg-bubble table {
  border-collapse: collapse;
  width: 100%;
  margin: 8px 0;
  font-size: 13px;
}
.msg-bubble th, .msg-bubble td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.msg-bubble th { background: var(--surface2); font-weight: 600; }
.msg-bubble a { color: var(--accent2); text-decoration: underline; }
.msg-bubble img { max-width: 100%; border-radius: var(--radius-sm); margin: 8px 0; }

/* SOP Buttons */
.sop-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.sop-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}
.sop-btn:hover { border-color: var(--gold); color: var(--gold); }
.sop-btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border-color: transparent;
}
.sop-btn-primary:hover { opacity: .9; color: #fff; }

/* Payment */
.payment-btn {
  display: inline-block;
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0b1120;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity .2s;
}
.payment-btn:hover { opacity: .9; }

/* Input */
.input-area {
  flex-shrink: 0;
  padding: 16px 24px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: flex-end;
}
.input-area textarea {
  flex: 1;
  padding: 10px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.5;
  transition: border .2s;
}
.input-area textarea:focus { border-color: var(--gold); }
.input-area .send-btn {
  padding: 10px 24px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
  white-space: nowrap;
}
.input-area .send-btn:hover { opacity: .9; }
.input-area .send-btn:disabled { opacity: .4; cursor: not-allowed; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 1000;
}
.modal-overlay.show { display: flex; align-items: center; justify-content: center; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: 400px;
  max-width: 90vw;
  text-align: center;
}
.modal h3 { font-size: 18px; margin-bottom: 8px; }
.modal p { color: var(--text2); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
.modal .btn-row { display: flex; gap: 12px; justify-content: center; }
.modal .btn-cancel {
  padding: 10px 24px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg2);
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
}
.modal .btn-pay {
  padding: 10px 24px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0b1120;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

@media (max-width: 768px) {
  .msg { max-width: 92%; }
  .messages { padding: 12px; }
  .input-area { padding: 10px 12px; gap: 8px; }
  .topbar { padding: 2px 10px; gap: 5px; }
  .sop-steps { display: none; }
  .msg-bubble { font-size: 14px; padding: 10px 14px; }
  .msg-avatar { width: 28px; height: 28px; font-size: 11px; }
  .menu-cards { flex-direction: column; gap: 12px; }
  .menu-inner { padding: 24px 16px; }
  .menu-inner h1 { font-size: 24px; }
  .login-box { padding: 32px 20px 24px; width: 90vw; }
  .modal { padding: 24px; width: 90vw; }
  .input-area textarea { font-size: 16px; }
  .topbar .back-btn { font-size: 14px; padding: 2px 4px; }
  .clear-btn { font-size: 10px; padding: 1px 6px; }
}

@media (max-width: 420px) {
  .topbar .clear-btn { display: none; }
  .topbar .back-btn { font-size: 13px; }
}

/* 超小屏适配 */
@media (max-width: 380px) {
  .msg { max-width: 96%; }
  .msg-bubble { font-size: 13px; padding: 8px 12px; }
  .input-area { padding: 8px 8px; }
}
</style>
</head>
<body>

<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>AI Talk</h1>
    <p class="sub">正在进入...</p>
    <div id="loginLoading" style="text-align:center;padding:12px;color:var(--text2);font-size:14px;">初始化中...</div>
  </div>
</div>

<div class="menu-page" id="menuPage">
  <div class="menu-inner">
    <h1>👋 欢迎回来</h1>
    <p class="sub">选择一种对话模式开始</p>
    <div class="menu-cards">
      <div class="menu-card" onclick="enterMode('free')">
        <div class="icon">💬</div>
        <h3>自由对话</h3>
        <p>与 AI 进行开放式对话，<br>问答、闲聊、讨论任何话题</p>
      </div>
      <div class="menu-card" onclick="enterMode('ad')">
        <div class="icon">🎬</div>
        <h3>广告剧本制作</h3>
        <p>AI 引导的 6 步 SOP 流程，<br>生成专业广告创意方案</p>
      </div>
    </div>
  </div>
</div>

<div class="chat-page" id="chatPage">
  <div class="topbar">
    <button class="back-btn" onclick="showMenu()" title="返回菜单">← 返回</button>
    <button class="clear-btn" onclick="clearHistory()">🗑 清除</button>
    <div class="sop-steps" id="sopSteps">
      <span class="step-dot" data-step="0">0</span>
      <span class="step-line"></span>
      <span class="step-dot" data-step="1">1</span>
      <span class="step-line"></span>
      <span class="step-dot" data-step="2">2</span>
      <span class="step-line"></span>
      <span class="step-dot" data-step="3">3</span>
      <span class="step-line"></span>
      <span class="step-dot" data-step="4">4</span>
      <span class="step-line"></span>
      <span class="step-dot" data-step="5">5</span>
      <span class="step-line"></span>
      <span class="step-dot" data-step="6">6</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="chatInput" rows="1" placeholder="输入消息..." oninput="autoResize(this)" onkeydown="onKeyDown(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<div class="modal-overlay" id="paymentModal">
  <div class="modal">
    <h3>🔓 解锁完整 SOP 流程</h3>
    <p>你已完成前4步，产品方向正确！<br>解锁后可获得分镜提示词和全套美术资产。</p>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closePayment()">取消</button>
      <button class="btn-pay" onclick="verifyPayment()">已完成支付（¥0.1）</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('web_token') || '';
let currentMode = 'free';
let sopStep = 0;
let loading = false;
let isMobile = false;

// ===== 设备检测 =====
(function detectDevice() {
  function check() {
    const ua = navigator.userAgent;
    const mobileRE = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobi/i;
    isMobile = mobileRE.test(ua) || window.innerWidth < 768;
    document.documentElement.setAttribute('data-device', isMobile ? 'mobile' : 'desktop');
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    document.documentElement.setAttribute('data-ios', isIOS ? 'true' : 'false');
    const isWeChat = /MicroMessenger/i.test(ua);
    const isDingTalk = /DingTalk/i.test(ua);
    const isQQ = /QQ\//i.test(ua);
    document.documentElement.setAttribute('data-browser',
      isWeChat ? 'wechat' : isDingTalk ? 'dingtalk' : isQQ ? 'qq' : 'other'
    );
    document.body.classList.toggle('is-mobile', isMobile);
  }
  check();
  // 窗口大小变化时重新检测（防抖）
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(check, 200);
  });
})();

// ===== 移动端键盘遮挡适配 =====
(function setupKeyboardHandler() {
  if (!window.visualViewport) return;
  const inputArea = document.querySelector('.input-area');
  if (!inputArea) return;
  let lastVHeight = window.visualViewport.height;
  // 获取 safe-area 基准值
  const baseBottom = (() => {
    const raw = getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom').trim();
    const num = parseInt(raw);
    return num > 0 ? num : 0;
  })();

  window.visualViewport.addEventListener('resize', () => {
    const vh = window.visualViewport.height;
    const diff = lastVHeight - vh;
    if (diff > 80) {
      inputArea.style.paddingBottom = (diff + 8 + baseBottom) + 'px';
      const msgs = document.getElementById('messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    } else if (diff < -80) {
      inputArea.style.paddingBottom = (8 + baseBottom) + 'px';
    }
    lastVHeight = vh;
  });
})();

// ===== 安全区域适配 =====
(function setupSafeArea() {
  const inputArea = document.querySelector('.input-area');
  if (!inputArea) return;
  const safeBottom = getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom').trim();
  if (safeBottom && safeBottom !== '0px') {
    inputArea.style.paddingBottom = safeBottom;
  }
})();

// 获取或生成访客 ID
function getVisitorId() {
  let vid = localStorage.getItem('visitor_id');
  if (!vid) {
    vid = crypto.randomUUID ? crypto.randomUUID() : 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    localStorage.setItem('visitor_id', vid);
  }
  return vid;
}

// 页面加载即自动登录
if (token) {
  showMenu();
} else {
  autoLogin();
}

async function autoLogin() {
  const vid = getVisitorId();
  const loginEl = document.getElementById('loginLoading');
  try {
    const r = await fetch(API + '/api/web/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ visitor_id: vid })
    });
    if (!r.ok) { loginEl.textContent = '登录失败，请刷新重试'; return; }
    const d = await r.json();
    token = d.token;
    localStorage.setItem('web_token', token);
    showMenu();
  } catch(e) {
    loginEl.textContent = '连接服务器失败，请刷新重试';
  }
}

function showMenu() {
  document.getElementById('chatPage').classList.remove('active');
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('menuPage').classList.add('active');
}

function enterMode(mode) {
  document.getElementById('menuPage').classList.remove('active');
  currentMode = mode;
  const isAd = mode === 'ad';
  document.getElementById('sopSteps').style.display = isAd ? 'flex' : 'none';
  if (!isAd) { sopStep = 0; updateSteps(); }
  document.getElementById('chatPage').classList.add('active');
  loadHistory();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// Markdown to HTML
function getWelcomeMsg() {
  if (currentMode === 'ad') {
    return '你好！我是你的AI带货视频制作顾问 🎬\n\n我将引导你完成以下步骤：\n\n**第1步** 产品理解 — 请你先告诉我关于产品的信息\n**第2步** 创意选择 — 我会生成3版剧情创意供你选择\n**第3步** 完整脚本 — 确定创意后扩展为完整短片脚本\n**第4步** 广告海报 — 免费生成2张产品广告概念图\n**第5步** 分镜提示词 — 付费后解锁\n**第6步** 美术资产 — 付费后解锁\n\n---\n\n让我们从 **第1步：产品理解** 开始！';
  }
  return '你好，有什么我可以帮你的吗？';
}

function mdToHtml(text) {
  if (!text) return '';
  let codeBlocks = [], inlineCodes = [];
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => { codeBlocks.push({lang,code}); return '%%%CB_'+ (codeBlocks.length-1) +'%%%'; });
  text = text.replace(/`([^`]+)`/g, (_, c) => { inlineCodes.push(c); return '%%%IC_'+ (inlineCodes.length-1) +'%%%'; });
  text = text.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
  text = text.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
  text = text.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  text = text.replace(/^[-*_]{3,}\s*$/gm, '<hr>');
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  text = text.replace(/^[*+-] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>)\n(?=<li>)/g, '$1');
  text = text.replace(/((?:<li>[\s\S]*?<\/li>(?:\n|$)){1,})/g, '<ul>$1</ul>');
  text = text.replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>');
  text = text.replace(/((?:<li>[\s\S]*?<\/li>(?:\n|$)){1,})/g, '<ol>$1</ol>');
  text = text.replace(/^\|(.+)\|$/gm, (m, inner) => {
    if (/^[\s\-:|]+$/.test(inner)) return '';
    return '<tr><td>'+ inner.split('|').map(c=>c.trim()).join('</td><td>') +'</td></tr>';
  });
  text = text.replace(/((?:<tr>[\s\S]*?<\/tr>(?:\n|$)){1,})/g, '<table>$1</table>');
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
  text = text.replace(/%%%IC_(\d+)%%%/g, (_, i) => '<code>'+ escapeHtml(inlineCodes[parseInt(i)]) +'</code>');
  text = text.replace(/%%%CB_(\d+)%%%/g, (_, i) => {
    const b = codeBlocks[parseInt(i)];
    return '<pre><code>'+ escapeHtml(b.code) +'</code></pre>';
  });
  text = text.replace(/\n\n+/g, '</p><p>');
  text = text.replace(/\n/g, '<br>');
  if (!/^<(h[1-6]|ul|ol|li|table|tr|pre|blockquote|hr|p)/i.test(text)) text = '<p>'+ text +'</p>';
  text = text.replace(/<\/?(h[1-6]|ul|ol|li|table|tr|td|th|pre|blockquote|p|hr)><br>/g, '</$1>');
  text = text.replace(/<br><\/(h[1-6]|ul|ol|li|table|tr|td|th|pre|blockquote|p)/g, '</$1');
  return text;
}

function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// SOP Buttons
function getButtons(step) {
  const map = {
    1: [{l:'✅ 确认，继续',a:'confirm_step_2',p:true},{l:'✏️ 需要修改',a:'modify',p:false}],
    2: [{l:'① 选第1版',a:'select_1',p:false},{l:'② 选第2版',a:'select_2',p:false},{l:'③ 选第3版',a:'select_3',p:false},{l:'✏️ 需要修改',a:'modify',p:false}],
    3: [{l:'✅ 确认，进入海报',a:'confirm_step_4',p:true},{l:'✏️ 需要修改',a:'modify',p:false}],
    4: [{l:'✅ 确认，下一步',a:'confirm_step_5',p:true},{l:'🔄 需要修改',a:'modify_poster',p:false}],
    5: [{l:'✅ 确认，进入资产',a:'confirm_step_6',p:true},{l:'✏️ 需要修改',a:'modify',p:false}],
    6: [{l:'🎉 完成交付',a:'done',p:true}]
  };
  return map[step] || null;
}

function updateSteps() {
  document.querySelectorAll('.step-dot').forEach(el => {
    const s = parseInt(el.dataset.step);
    el.classList.toggle('active', s === sopStep);
    el.classList.toggle('done', s > 0 && s < sopStep);
  });
  document.querySelectorAll('.step-line').forEach((el, i) => {
    el.classList.toggle('done', i+1 < sopStep);
  });
}

function addMsg(role, content, extra) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  const avatar = role === 'ai' ? 'AI' : '我';
  let html = '<div class="msg-avatar '+ role +'">'+ avatar +'</div>';
  html += '<div class="msg-content"><div class="msg-bubble">';
  if (role === 'ai') {
    html += mdToHtml(content);
  } else {
    html += '<p>' + escapeHtml(content) + '</p>';
  }
  html += '</div>';
  // SOP buttons
  if (role === 'ai' && extra && extra.buttons) {
    html += '<div class="sop-actions">';
    extra.buttons.forEach(b => {
      html += '<button class="sop-btn' + (b.p ? ' sop-btn-primary' : '') + '" onclick="sopAction(\''+ b.a +'\',\''+ b.l +'\')">'+ b.l +'</button>';
    });
    html += '</div>';
  }
  // Payment button
  if (extra && extra.payment) {
    html += '<button class="payment-btn" onclick="openPayment()">🔓 付费解锁完整 SOP</button>';
  }
  // Images
  if (extra && extra.images && extra.images.length) {
    extra.images.forEach(u => { html += '<img src="'+ u +'" style="max-width:100%;border-radius:8px;margin-top:8px">'; });
  }
  html += '</div></div>';
  el.innerHTML = html;
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

async function clearHistory() {
  if (!confirm('确认清除当前模式的所有聊天记录？')) return;
  try {
    await fetch(API + '/api/chat/clear?mode=' + currentMode, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    document.getElementById('messages').innerHTML = '';
    if (currentMode === 'ad') { sopStep = 0; updateSteps(); }
    addMsg('ai', getWelcomeMsg(), {});
  } catch(e) { console.error('清除失败', e); }
}

async function loadHistory() {
  try {
    const r = await fetch(API + '/api/history?mode=' + currentMode, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (r.status === 401) { token = ''; localStorage.removeItem('web_token'); location.reload(); return; }
    if (!r.ok) return;
    const d = await r.json();
    document.getElementById('messages').innerHTML = '';
    // Add welcome if empty
    if (!d.messages || d.messages.length === 0) {
      addMsg('ai', getWelcomeMsg(), {});
      if (currentMode === 'ad') { sopStep = 0; updateSteps(); }
      return;
    }
    d.messages.forEach(msg => {
      const role = msg.role === 'ai' ? 'ai' : 'user';
      addMsg(role, msg.content, {});
    });
    // Load SOP step only for ad mode
    if (currentMode === 'ad') {
      const u = await fetch(API + '/api/user/info', { headers: { 'Authorization': 'Bearer ' + token }});
      if (u.ok) { const ud = await u.json(); sopStep = ud.sop_step || 0; updateSteps(); }
    }
  } catch(e) { console.error('loadHistory', e); }
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || loading) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', msg, {});
  loading = true;
  document.getElementById('sendBtn').disabled = true;
  try {
    const r = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, mode: currentMode })
    });
    const d = await r.json();
    if (r.status === 401) { token=''; localStorage.removeItem('web_token'); location.reload(); return; }
    if (d.sop_step !== undefined) sopStep = d.sop_step;
    updateSteps();
    if (d.reply) {
      const buttons = getButtons(sopStep);
      addMsg('ai', d.reply, { buttons: buttons });
    }
    if (d.jimeng_images && d.jimeng_images.length) {
      const urls = d.jimeng_images.map(u => u.startsWith('http') ? u : API + u);
      addMsg('ai', '以上是根据你的创意生成的 ' + urls.length + ' 张概念图：', { images: urls });
    }
    if (d.requires_payment) {
      addMsg('ai', '', { payment: true });
    }
  } catch(e) {
    addMsg('ai', '连接失败，请重试', {});
  } finally {
    loading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

async function sopAction(action, label) {
  if (loading) return;
  // 立即禁用所有 SOP 按钮防重复点击
  document.querySelectorAll('.sop-btn').forEach(b => b.style.pointerEvents = 'none');
  addMsg('user', label, {});
  loading = true;
  document.getElementById('sendBtn').disabled = true;
  try {
    const r = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: label, sop_action: action, mode: 'ad' })
    });
    const d = await r.json();
    if (r.status === 401) { token=''; localStorage.removeItem('web_token'); location.reload(); return; }
    if (d.sop_step !== undefined) sopStep = d.sop_step;
    updateSteps();
    if (d.reply) {
      const buttons = getButtons(sopStep);
      addMsg('ai', d.reply, { buttons: buttons });
    }
    if (d.jimeng_images && d.jimeng_images.length) {
      const urls = d.jimeng_images.map(u => u.startsWith('http') ? u : API + u);
      addMsg('ai', '以上是根据你的创意生成的 ' + urls.length + ' 张概念图：', { images: urls });
    }
    if (d.requires_payment) {
      addMsg('ai', '', { payment: true });
    }
  } catch(e) {
    addMsg('ai', '操作失败', {});
    console.error('sopAction', e);
    document.querySelectorAll('.sop-btn').forEach(b => b.style.pointerEvents = 'auto');
  } finally {
    loading = false;
    document.getElementById('sendBtn').disabled = false;
    // 恢复 SOP 按钮可点击
    document.querySelectorAll('.sop-btn').forEach(b => b.style.pointerEvents = '');
  }
}

function openPayment() {
  document.getElementById('paymentModal').classList.add('show');
}

function closePayment() {
  document.getElementById('paymentModal').classList.remove('show');
}

async function verifyPayment() {
  try {
    const r = await fetch(API + '/api/payment/verify', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const d = await r.json();
    if (d.paid) {
      closePayment();
      addMsg('user', '已付费，进入分镜阶段', {});
      if (d.reply) {
        // 后端已自动生成 Step 5 内容
        addMsg('ai', d.reply, {});
        loading = false;
        document.getElementById('sendBtn').disabled = false;
      } else {
        // 回退：手动触发
        await new Promise(r => setTimeout(r, 500));
        sopAction('confirm_step_5', '✅ 确认，下一步');
      }
    }
  } catch(e) { console.error(e); }
}
</script>
